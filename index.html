<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Local Record App</title>

<style>
/* ===== GALAXY ANIMATIONS ===== */
@keyframes spaceFade {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes starsMove {
  from { background-position: 0 0; }
  to { background-position: -10000px 5000px; }
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
  color: #fff;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  overflow-x: hidden;
}

/* Moving Star Layer */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
  z-index: -1;
  animation: starsMove 250s linear infinite;
}

.logout-btn {
  position: fixed;
  top: 15px;
  right: 20px;
  background: #e74c3c;
  color: white;
  padding: 8px 18px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  z-index: 1000;
  box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
  transition: 0.3s;
}
.logout-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #e74c3c; }

.box {
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 15px;
  max-width: 1000px;
  margin: auto;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  animation: spaceFade 0.8s ease-out;
}

h2 {
  margin-top: 0;
  color: #a29bfe;
  text-shadow: 0 0 10px rgba(162, 155, 254, 0.5);
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

input, select, button {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  outline: none;
}

input::placeholder { color: #bbb; }

input:focus {
  background: rgba(255, 255, 255, 0.15);
  border-color: #a29bfe;
}

button {
  background: #6c5ce7;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #5b4cc4;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
}

.search-bar {
  background: rgba(0, 0, 0, 0.2);
  padding: 15px;
  border-radius: 10px;
  margin: 20px 0;
  display: flex;
  gap: 10px;
  border: 1px solid rgba(162, 155, 254, 0.3);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th { background: rgba(108, 92, 231, 0.7); color: #fff; }
th, td { padding: 12px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; }

tbody tr:hover { background: rgba(255, 255, 255, 0.05); }

.edit-btn { background: #f39c12; color: white; }
.action-btn { background: #e74c3c; color: white; }

/* Custom Date Picker Icon Color */
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
}
</style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>SERVICE REQUEST LOGIN</h2>
  <input id="password" type="password" placeholder="Password" style="width: calc(100% - 26px);">
  <button onclick="login()" style="width: 100%; margin-top: 15px;">Login</button>
</div>

<button class="logout-btn" id="logoutBtn" onclick="logout()" style="display:none">Logout</button>

<div class="box" id="appBox" style="display:none">
  <h2>SERVICE REQUEST DATA</h2>

  <div class="input-grid">
    <input id="number" placeholder="Number">
    <input id="fullName" placeholder="Name">
    <input id="phone" placeholder="Phone/lan no">
    <input id="address" placeholder="Address">
    <input id="city" placeholder="City">
    <input id="date" type="date">
  </div>
  <button onclick="addRecord()" style="width: 100%;">Save</button>

  <div class="search-bar">
    <select id="searchType" onchange="loadRecords()" style="background: #2d3436;">
      <option value="name">Search by Name</option>
      <option value="number">Search by Number (Exact)</option>
    </select>
    <input id="searchQuery" placeholder="Type to search..." oninput="loadRecords()" style="flex-grow: 1;">
  </div>

  <table>
    <thead>
      <tr>
        <th>Number</th><th>Name</th><th>Phone/lan no</th>
        <th>Address</th><th>City</th><th>Date</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
const PASSWORD_HASH = "MjQwNw=="; // 2407
const hash = t => btoa(t);

let db;
const req = indexedDB.open("RecordDB", 1);

req.onupgradeneeded = e => {
  e.target.result.createObjectStore("records", { keyPath: "id", autoIncrement: true });
};

req.onsuccess = e => { db = e.target.result; };

function login() {
  if(hash(document.getElementById('password').value) === PASSWORD_HASH){
    loginBox.style.display="none";
    appBox.style.display="block";
    logoutBtn.style.display="block";
    loadRecords();
  } else {
    alert("Wrong password");
  }
}

function logout() { location.reload(); }

function addRecord() {
  if(!number.value || !fullName.value) {
    alert("Number and Name required");
    return;
  }

  const tx = db.transaction("records", "readwrite");
  tx.objectStore("records").add({
    number: number.value.trim(),
    fullName: fullName.value.trim(),
    phone: phone.value.trim(),
    address: address.value.trim(),
    city: city.value.trim(),
    date: date.value
  });

  tx.oncomplete = () => {
    ['number','fullName','phone','address','city','date'].forEach(id => document.getElementById(id).value = "");
    loadRecords();
  };
}

function loadRecords() {
  const tableBody = document.getElementById('table');
  tableBody.innerHTML = "";
  
  const type = document.getElementById('searchType').value;
  const query = document.getElementById('searchQuery').value.trim().toLowerCase();

  if(!db) return;

  const tx = db.transaction("records", "readonly");
  const store = tx.objectStore("records");

  store.openCursor().onsuccess = e => {
    const cursor = e.target.result;
    if(!cursor) return;

    const val = cursor.value;
    let isMatch = false;

    if (query === "") {
      isMatch = true; 
    } else {
      if (type === "number") {
        // EXACT match for number
        isMatch = (String(val.number) === query);
      } else {
        // Name search (case-insensitive)
        const nameInDb = val.fullName ? val.fullName.toLowerCase() : "";
        isMatch = nameInDb.includes(query);
      }
    }

    if (isMatch) {
      tableBody.innerHTML += `<tr>
          <td><b>${val.number}</b></td>
          <td>${val.fullName}</td>
          <td>${val.phone}</td>
          <td>${val.address}</td>
          <td>${val.city}</td>
          <td>${val.date}</td>
          <td>
            <button class="edit-btn" onclick="edit(${cursor.key})">Edit</button>
            <button class="action-btn" onclick="del(${cursor.key})">Delete</button>
          </td>
        </tr>`;
    }
    cursor.continue();
  };
}

function del(id) {
  if(confirm("Are you sure?")) {
    const tx = db.transaction("records", "readwrite");
    tx.objectStore("records").delete(id);
    tx.oncomplete = loadRecords;
  }
}

function edit(id) {
  const store = db.transaction("records", "readwrite").objectStore("records");
  store.get(id).onsuccess = e => {
    const r = e.target.result;
    const n = prompt("Name:", r.fullName);
    if(n !== null) {
      r.fullName = n;
      r.phone = prompt("Phone/lan no:", r.phone);
      r.address = prompt("Address:", r.address);
      r.city = prompt("City:", r.city);
      r.date = prompt("Date:", r.date);
      const upTx = db.transaction("records", "readwrite");
      upTx.objectStore("records").put(r);
      upTx.oncomplete = loadRecords;
    }
  };
}
</script>

</body>
</html>
